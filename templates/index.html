<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlantDoc</title>

  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <main class="app">

    <header class="app-header">
      <h1>🌿 PlantDoc</h1>
      <p class="subtitle">AI-powered plant disease detection</p>
    </header>

    <div class="card">

      <form id="uploadForm">
        <input type="file" id="fileInput" accept="image/*" required />

        <div class="buttons">
          <button type="button" id="cameraBtn">📸 Camera</button>
          <button type="submit" id="analyzeBtn">🔍 Analyze</button>
        </div>
      </form>

      <div id="preview"></div>

      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Analyzing plant...</p>
      </div>

      <div id="result"></div>

    </div>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
