<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlantDoc</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <main class="app">

    <header class="app-header">
      <h1>🌿 PlantDoc AI 🌿</h1>
      <p class="subtitle">AI-powered plant disease detection</p>
    </header>

    <div class="card">

      <form id="uploadForm">

  <input 
    type="file" 
    id="fileInput" 
    name="file"
    accept="image/*" 
    capture="environment"
    required
  />

  <div class="buttons">
    <button type="button" id="cameraBtn">📸 Camera</button>
    <button type="button" id="uploadBtn">📁 Upload</button>
    <button type="submit" id="analyzeBtn">🔍 Analyze</button>
  </div>

</form>

      <div id="preview"></div>

      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Analyzing plant...</p>
      </div>

      <div id="result" class="result-box hidden">
  <h2>🌿 Diagnosis Result</h2>

  <div class="card">
    <h3>🦠 Disease</h3>
    <p id="disease"></p>
  </div>

  <div class="card">
    <h3>📊 Confidence</h3>
    <p id="confidence"></p>
  </div>

  <div class="card">
    <h3>🔍 Symptoms</h3>
    <ul id="symptoms"></ul>
  </div>

  <div class="card">
    <h3>💊 Remedies</h3>
    <ul id="remedies"></ul>
  </div>
</div>

  </main>

  <script src="/static/app.js"></script>

  <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js")
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("Service Worker Failed", err));
}
</script>
</body>
</html>
